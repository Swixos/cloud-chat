<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h1>Cloud Chat</h1>
      <p>{{ isRegister() ? 'Créer un compte' : 'Connexion' }}</p>
    </div>

    @if (error()) {
      <div class="error-banner">{{ error() }}</div>
    }

    <form (ngSubmit)="onSubmit()" class="login-form">
      @if (isRegister()) {
        <div class="form-group">
          <label for="name">Nom complet</label>
          <input id="name" type="text" [(ngModel)]="name" name="name" placeholder="Votre nom" required />
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input id="email" type="email" [(ngModel)]="email" name="email" placeholder="votre@email.com" required />
        </div>
      }

      <div class="form-group">
        <label for="username">Nom d'utilisateur</label>
        <input id="username" type="text" [(ngModel)]="username" name="username" placeholder="Nom d'utilisateur" required />
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input id="password" type="password" [(ngModel)]="password" name="password" placeholder="Mot de passe" required minlength="4" />
      </div>

      <button type="submit" class="btn-primary" [disabled]="loading()">
        @if (loading()) {
          <span class="spinner"></span>
        } @else {
          {{ isRegister() ? "S'inscrire" : 'Se connecter' }}
        }
      </button>
    </form>

    <div class="login-footer">
      <button type="button" class="btn-link" (click)="toggleMode()">
        {{ isRegister() ? 'Déjà un compte ? Se connecter' : "Pas de compte ? S'inscrire" }}
      </button>
    </div>
  </div>
</div>
